// ── TICKET LIST ────────────────────────────────────────────────────
function renderTicketList(main, filter) {
  let tickets = [...TICKETS_ALL];
  if (filter === 'open')     tickets = tickets.filter(t=>t.status==='open');
  if (filter === 'pending')  tickets = tickets.filter(t=>t.status==='pending');
  if (filter === 'resolved') tickets = tickets.filter(t=>t.status==='resolved');
  if (filter === 'urgent')   tickets = tickets.filter(t=>t.priority==='urgent');

  const title = {all:'All Tickets',open:'Open Tickets',pending:'Pending',resolved:'Resolved',urgent:'Urgent'}[filter]||'Tickets';

  main.innerHTML=`
    <div class="page-header">
      <div class="page-header-left"><h1>${title}</h1><p>${tickets.length} ticket${tickets.length!==1?'s':''}</p></div>
      <div class="page-header-actions">
        <div class="search-wrap" style="margin:0"><span>${icon('search',14)}</span><input placeholder="Search tickets..." oninput="ticketSearch(this.value)" style="width:200px"></div>
        <button class="btn btn-primary" onclick="showNewTicketModal()">${icon('plus',13)} New Ticket</button>
      </div>
    </div>

    <!-- Filter bar -->
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <select onchange="ticketFilterStatus(this.value)" style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;background:#fff">
        <option value="all">All statuses</option>
        ${['open','pending','on hold','resolved','closed'].map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
      </select>
      <select onchange="ticketFilterPriority(this.value)" style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;background:#fff">
        <option value="all">All priorities</option>
        ${['urgent','high','medium','low'].map(p=>`<option value="${p}">${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
      </select>
      <select onchange="ticketFilterAgent(this.value)" style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;background:#fff">
        <option value="all">All agents</option>
        ${TICKET_AGENTS.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}
      </select>
      <span style="margin-left:auto;font-size:12.5px;color:var(--muted)">${tickets.length} results</span>

    <div class="card section-card" id="ticket-list-wrap">
      ${tickets.length ? `
        <div style="display:flex;align-items:center;padding:9px 20px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);background:var(--bg-page)">
          <div style="width:60px">#ID</div>
          <div style="flex:1">Subject</div>
          <div style="width:160px">Company</div>
          <div style="width:100px">Agent</div>
          <div style="width:90px">Status</div>
          <div style="width:80px">Priority</div>
          <div style="width:80px">Sentiment</div>
          <div style="width:70px">Updated</div>
        </div>

function ticketRow(t) {
  const agent = TICKET_AGENTS.find(a=>a.id===t.agent);
  return `<div onclick="navigate('tickets',{filter:'all',id:${t.id}})" style="display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--bg-page)'" onmouseout="this.style.background='transparent'">
    <div style="width:60px;font-size:12.5px;font-weight:600;color:var(--muted)">#${t.id}</div>
    <div style="flex:1;min-width:0;padding-right:12px">
      <div style="font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.subject}</div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${t.type} ${t.tags.map(tag=>`<span style="background:#f3f4f6;padding:1px 6px;border-radius:8px;font-size:10.5px;color:var(--muted)">${tag}</span>`).join(' ')}</div>
    </div>
    <div style="width:160px;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${t.company}</div>
    <div style="width:100px">
      ${agent?`<div style="display:flex;align-items:center;gap:6px"><div class="person-initials ${agent.cls}" style="width:22px;height:22px;font-size:9px">${agent.initials}</div><span style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${agent.name.split(' ')[0]}</span></div>`:'<span style="font-size:12px;color:var(--muted)">—</span>'}
    </div>
    <div style="width:90px">${ticketPill(t.status)}</div>
    <div style="width:80px">${priorityPill(t.priority)}</div>
    <div style="width:80px;font-size:16px;text-align:center">${sentimentIcon(t.score)}</div>
    <div style="width:70px;font-size:12px;color:var(--muted)">${timeAgo(t.updated)}</div>
  </div>`;
}

function ticketSearch(q) {
  const wrap = document.getElementById('ticket-list-wrap');
  if (!wrap) return;
  const l = q.toLowerCase();
  const filtered = TICKETS_ALL.filter(t=>
    t.subject.toLowerCase().includes(l) || t.company.toLowerCase().includes(l) ||
    t.requester.toLowerCase().includes(l) || t.type.toLowerCase().includes(l) ||
    String(t.id).includes(l) || t.tags.some(tag=>tag.includes(l))
  );
  wrap.innerHTML = filtered.length ?
    filtered.map(t=>ticketRow(t)).join('') :
    '<div style="padding:28px;text-align:center;color:var(--muted)">No tickets match your search</div>';
}

function ticketFilterStatus(v) {
  const wrap = document.getElementById('ticket-list-wrap');if(!wrap)return;
  const filtered = v==='all' ? TICKETS_ALL : TICKETS_ALL.filter(t=>t.status===v);
  wrap.innerHTML = filtered.map(t=>ticketRow(t)).join('');
}

function ticketFilterPriority(v) {
  const wrap = document.getElementById('ticket-list-wrap');if(!wrap)return;
  const filtered = v==='all' ? TICKETS_ALL : TICKETS_ALL.filter(t=>t.priority===v);
  wrap.innerHTML = filtered.map(t=>ticketRow(t)).join('');
}

function ticketFilterAgent(v) {
  const wrap = document.getElementById('ticket-list-wrap');if(!wrap)return;
  const filtered = v==='all' ? TICKETS_ALL : TICKETS_ALL.filter(t=>t.agent===v);
  wrap.innerHTML = filtered.map(t=>ticketRow(t)).join('');
}

function switchReplyMode(mode) {
  const replyBtn = document.getElementById('reply-btn');
  const noteBtn = document.getElementById('note-btn');
  const body = document.getElementById('reply-body');
  if (!replyBtn) return;
  if (mode === 'reply') {
    replyBtn.className = 'btn btn-secondary';
    noteBtn.className = 'btn btn-ghost';
    body.style.background = '#fff';
    body.placeholder = 'Write your reply...';
  } else {
    noteBtn.className = 'btn btn-secondary';
    replyBtn.className = 'btn btn-ghost';
    body.style.background = '#fffbeb';
    body.placeholder = 'Add a private note (only visible to agents)...';
  }
}

        <div><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Priority</label>
        <select style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;background:#fff"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select></div>
        <div><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Agent</label>

      </div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Description</label><textarea placeholder="Describe the issue..." rows="5" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;resize:vertical"></textarea></div>
    </div>
    <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove();toast('Ticket created successfully')">${icon('check',13)} Create Ticket</button>
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay)overlay.remove(); });
  document.body.appendChild(overlay);
}

// cosICSelected, cosICNewStep, cosICActiveTab declared at top of script
let cosICDrafting  = false;
let cosICNewFields = {title:'',dealType:'',amount:'',counterparty:'',purpose:'',security:'',term:'',rate:'',lvr:'',extraContext:''};
let cosICDraftContent = '';

const COS_DEAL_TYPES = [
  'First Mortgage Loan','Second Mortgage Loan','Construction Loan',
  'Mezzanine Finance','Preferred Equity','Contributory Mortgage Scheme','Other'
];

// ── HELPERS ───────────────────────────────────────────────────────
function cosICRefresh() {
  try { CosDB.savePrefs({cosICSelected, cosICActiveTab}); } catch(e) {}
  const main = document.getElementById('main-content');
  if (main) main.innerHTML = '<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">' + cosRenderView('ictool') + '</div>';
}

function cosICStatusStyle(status) {
  const map = {
    'DRAFT':          {bg:'var(--bg-page)',       color:'var(--muted)'},
    'STAGE1 VOTE':    {bg:'var(--yellow-light)',  color:'var(--yellow)'},
    'STAGE2 APPROVAL':{bg:'var(--blue-light)',    color:'var(--blue)'},
    'DOCS':           {bg:'var(--purple-light)',  color:'var(--purple)'},
    'DISTRIBUTION':   {bg:'#fce7f3',             color:'#be185d'},
    'COMPLIANCE':     {bg:'var(--blue-light)',    color:'var(--blue)'},
    'COMPLETE':       {bg:'var(--emerald-light)', color:'var(--emerald-text)'},
    'CLOSED':         {bg:'var(--red-light)',     color:'var(--red)'},
  };
  return map[status] || {bg:'var(--bg-page)',color:'var(--muted)'};
}

// ── MAIN VIEW ─────────────────────────────────────────────────────
function cosICTool() {
  if (!cosICSelected || !CLIME_IC_PAPERS.find(p=>p.id===cosICSelected))
    cosICSelected = CLIME_IC_PAPERS[0]?.id;
  if (cosICNewStep) return '<div style="flex:1;overflow:auto;padding:20px 24px">' + cosICNewProposalShell() + '</div>';

  const paper = CLIME_IC_PAPERS.find(p=>p.id===cosICSelected);

  // Left panel — paper list
  let paperList = '';
  CLIME_IC_PAPERS.forEach(p => {
    const sel = p.id === cosICSelected;
    const sc = cosICStatusStyle(p.status);
    const forV = (p.votes||[]).filter(v=>v.vote==='for'&&v.stage===(p.stage||1)).length;
    paperList +=
      '<div style="padding:11px 12px;border-radius:8px;border:1px solid '+(sel?'var(--blue)':'var(--border)')+';background:'+(sel?'var(--blue-light)':'var(--bg-card)')+';margin-bottom:7px;cursor:pointer;transition:all .15s" onclick="cosICSelected=\''+p.id+'\';cosICActiveTab=\'detail\';cosICRefresh()">' +
        '<div style="font-size:13px;font-weight:600;color:var(--near-black);margin-bottom:3px;line-height:1.3">' + p.title + '</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">' + p.type + ' · $' + (p.amount/1000000).toFixed(0) + 'M · ' + p.rate + '%</div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between">' +
          '<span style="background:'+sc.bg+';color:'+sc.color+';padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700">' + p.status + '</span>' +
          (p.dead
            ? '<span style="font-size:11px;color:var(--red);font-weight:600">\uD83D\uDC80 DEAD</span>'
            : '<span style="font-size:11.5px;color:var(--muted)">' + forV + '/' + CLIME_IC_MEMBERS.length + ' for</span>'
          ) +
        '</div>' +
      '</div>';
  });

  return '<div style="flex:1;display:flex;overflow:hidden">' +
    // Left panel
    '<div style="width:268px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg-page)">' +
      '<div style="padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">' +
        '<span style="font-size:13px;font-weight:600;color:var(--near-black)">IC Papers</span>' +
        '<button class="btn btn-primary" style="font-size:12px;padding:4px 10px" onclick="cosICNewProposal()">+ New</button>' +
      '</div>' +
      '<div style="flex:1;overflow:auto;padding:8px">' + paperList + '</div>' +
    '</div>' +
    // Right panel
    '<div style="flex:1;overflow:auto;padding:20px 24px">' +
      (paper ? cosICRightPanel(paper) : '<div style="color:var(--muted);padding:20px">Select an IC paper from the left.</div>') +
    '</div>' +
  '</div>';
}

function cosICRightPanel(p) {
  // Header
  const sc = cosICStatusStyle(p.status);
  const header =
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px">' +
      '<div>' +
        '<h2 style="font-size:18px;font-weight:700;color:var(--near-black);margin-bottom:4px">' + p.title + '</h2>' +
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
          '<span style="background:'+sc.bg+';color:'+sc.color+';padding:2px 9px;border-radius:4px;font-size:12px;font-weight:700">' + p.status + '</span>' +
          '<span style="font-size:13px;color:var(--muted)">' + p.type + ' · ' + p.borrower + ' · $' + (p.amount/1000000).toFixed(0) + 'M at ' + p.rate + '%</span>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:7px;flex-shrink:0">' +
        '<button class="btn btn-ghost" style="font-size:12.5px" onclick="cosICExportDocx(\''+p.id+'\')">↓ Approval Report</button>' +
        '<button class="btn btn-ghost" style="font-size:12.5px" onclick="cosICExportDocx(\''+p.id+'\')">↓ CCAS SIM</button>' +
      '</div>' +
    '</div>';

  // Stage bar
  const stages = CLIME_IC_STAGES;
  let stageBar = '<div class="card" style="padding:14px 16px;margin-bottom:14px"><div style="display:flex;align-items:center">';
  stages.forEach((st, i) => {
    const done = p.stage > st.num && !p.dead;
    const active = p.stage === st.num && !p.dead && !p.closed;
    const dead = p.dead && st.num <= p.stage;
    const bg = dead ? 'var(--red-light)' : done ? 'var(--emerald-light)' : active ? 'var(--blue)' : 'var(--bg-page)';
    const bd = dead ? 'var(--red)' : done ? 'var(--emerald)' : active ? 'var(--blue)' : 'var(--border)';
    const tc = dead ? 'var(--red)' : done ? 'var(--emerald-text)' : active ? '#fff' : 'var(--muted)';
    const ic = dead ? '\u2717' : done ? '\u2713' : st.num;
    if (i > 0) stageBar += '<div style="flex:1;height:2px;background:'+(done?'var(--emerald-light)':'var(--border)')+';margin-top:13px"></div>';
    stageBar +=
      '<div style="display:flex;flex-direction:column;align-items:center;min-width:48px">' +
        '<div style="width:26px;height:26px;border-radius:50%;background:'+bg+';border:2px solid '+bd+';display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:'+tc+'">' + ic + '</div>' +
        '<div style="font-size:8.5px;font-weight:'+(active?600:400)+';color:'+(active?'var(--blue)':done?'var(--emerald-text)':'var(--muted)')+';margin-top:4px;text-align:center;line-height:1.2">' + st.label + '</div>' +
      '</div>';
  });
  stageBar += '</div></div>';

  // Dead banner
  const deadBanner = (p.dead||p.closed)
    ? '<div style="background:var(--red-light);border:1px solid #fca5a5;border-radius:8px;padding:11px 15px;margin-bottom:14px;display:flex;align-items:center;gap:10px">' +
        '<span style="font-size:18px">\uD83D\uDC80</span>' +
        '<div><div style="font-size:13.5px;font-weight:700;color:var(--red)">Deal Closed \u2014 Permanently Dead</div>' +
        '<div style="font-size:12.5px;color:var(--red)">Failed Stage 1. Cannot be resubmitted.</div></div>' +
      '</div>' : '';

  // Tab bar — Michael's style underline tabs
  const docCount = (p.documents||[]).length;
  const discCount = (p.comments||[]).filter(c=>!c.isAI).length;
  const tabDefs = [
    ['detail','Deal'],
    ['votes','Votes & IC'],
    ['docs','Documents ('+docCount+')'],
    ['discussion','Discussion ('+discCount+')'],
    ['ai','\u2726 Ask BizGPT'],
    ['log','Audit Log'],
  ];
  let tabBar = '<div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto">';
  tabDefs.forEach(([id,label]) => {
    const active = cosICActiveTab === id;
    tabBar += '<button style="padding:8px 14px;font-size:12.5px;font-weight:'+(active?600:400)+';color:'+(active?'var(--near-black)':'var(--muted)')+';border:none;background:transparent;border-bottom:2px solid '+(active?'var(--near-black)':'transparent')+';cursor:pointer;white-space:nowrap;font-family:var(--font);flex-shrink:0" onclick="cosICActiveTab=\''+id+'\';cosICRefresh()">'+label+'</button>';
  });
  tabBar += '</div>';

  // Tab content
  let tabContent = '';
  if (cosICActiveTab==='detail')     tabContent = cosICTabDetail(p);
  else if (cosICActiveTab==='votes') tabContent = cosICTabVotes(p);
  else if (cosICActiveTab==='docs')  tabContent = cosICTabDocs(p);
  else if (cosICActiveTab==='discussion') tabContent = cosICTabDiscussion(p);
  else if (cosICActiveTab==='ai')    tabContent = cosICTabBizGPT(p);
  else if (cosICActiveTab==='log')   tabContent = cosICTabLog(p);

  // Action bar
  const canVote    = !p.dead && !p.closed && p.stage >= 1 && p.stage <= 2;
  const canAdvance = !p.dead && !p.closed && p.stage >= 1;
  const actionBar = (!p.dead && !p.closed)
    ? '<div style="display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap">' +
        (canVote ? '<button class="btn btn-primary" onclick="cosICVote(\''+p.id+'\')">Cast Vote \u2192</button>' : '') +
        '<button class="btn btn-ghost" onclick="cosICPostDiscussion(\''+p.id+'\')">Add Comment</button>' +
        '<button class="btn btn-ghost" onclick="cosICUploadDoc(\''+p.id+'\')">Upload Doc</button>' +
        (canAdvance ? '<button class="btn btn-primary" style="margin-left:auto" onclick="cosICAdvanceStage(\''+p.id+'\')">Advance Stage \u2192</button>' : '') +
      '</div>' : '';

  return header + deadBanner + stageBar + tabBar + tabContent + actionBar;
}

// ── TABS ──────────────────────────────────────────────────────────
function cosICTabDetail(p) {
  const rows = [
    {l:'Amount',   v:'$'+p.amount.toLocaleString()},
    {l:'Rate',     v:p.rate+'% p.a.'},
    {l:'Type',     v:p.type},
    {l:'LVR',      v:p.lvr?p.lvr+'%':'N/A'},
    {l:'Coverage', v:p.coverage?p.coverage+'\u00d7':'N/A'},
    {l:'Term',     v:p.term||'N/A'},
    {l:'Borrower', v:p.borrower},
    {l:'Security', v:p.security||'N/A'},
  ].map(r =>
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px">' +
    '<span style="color:var(--muted);flex-shrink:0;width:90px">' + r.l + '</span>' +
    '<span style="font-weight:500;text-align:right;color:var(--body-text)">' + r.v + '</span></div>'
  ).join('');

  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +
    '<div class="card" style="padding:16px">' +
      '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Deal Details</div>' +
      rows +
    '</div>' +
    '<div>' +
      '<div class="card" style="padding:16px;margin-bottom:12px">' +
        '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Purpose</div>' +
        '<div style="font-size:13.5px;color:var(--muted);line-height:1.6">' + (p.summary||p.purpose||'No summary provided.') + '</div>' +
      '</div>' +
      (p.content
        ? '<div class="card" style="padding:16px">' +
            '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">\u2726 AI-Drafted Memorandum</div>' +
            '<div style="font-size:12.5px;color:var(--muted);line-height:1.7;max-height:180px;overflow:auto;white-space:pre-wrap;font-family:monospace">' + p.content.substring(0,600) + (p.content.length>600?'\u2026':'') + '</div>' +
            '<button class="btn btn-ghost" style="font-size:12px;margin-top:8px" onclick="cosICActiveTab=\'docs\';cosICRefresh()">View full document \u2192</button>' +
          '</div>'
        : '<div class="card" style="padding:16px;text-align:center;color:var(--muted)">' +
            '<div style="font-size:13px;margin-bottom:8px">No AI draft yet</div>' +
            '<button class="btn btn-ghost" style="font-size:12.5px" onclick="cosICNewStep=\'form\';cosICNewFields.title=\''+p.title+'\';cosICRefresh()">\u2726 Generate with BizGPT</button>' +
          '</div>'
      ) +
      '<div class="card" style="padding:14px;margin-top:12px">' +
        '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Voting Rules</div>' +
        '<div style="font-size:12.5px;color:var(--muted);line-height:1.7">' +
          '\u2022 <strong style="color:var(--near-black)">Majority rules</strong> \u2014 more FOR than AGAINST advances<br>' +
          '\u2022 <strong style="color:var(--red)">Stage 1 fail</strong> \u2014 deal permanently closed<br>' +
          '\u2022 <strong style="color:var(--yellow)">Stage 2+ fail</strong> \u2014 pushed back to previous stage<br>' +
          '\u2022 Pushed back to Stage 1 and fails again \u2014 deal dies' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function cosICTabVotes(p) {
  const sv = (p.votes||[]).filter(v=>v.stage===(p.stage||1));
  const forCount = sv.filter(v=>v.vote==='for').length;
  const againstCount = sv.filter(v=>v.vote==='against').length;
  const pendingCount = CLIME_IC_MEMBERS.length - sv.filter(v=>v.vote).length;
  const majority = forCount > againstCount;

  const banner = !p.dead && !p.closed
    ? '<div style="padding:9px 14px;background:'+(majority&&pendingCount===0?'var(--emerald-light)':againstCount>forCount?'var(--red-light)':'var(--yellow-light)')+';border-bottom:1px solid var(--border-light);font-size:13px;font-weight:600;color:'+(majority&&pendingCount===0?'var(--emerald-text)':againstCount>forCount?'var(--red)':'#92400e')+'">' +
        (majority&&pendingCount===0 ? '\u2713 Majority reached \u2014 ready to advance' :
         againstCount>forCount ? '\u2717 Against majority \u2014 would fail at this stage' :
         '\u23f3 In progress \u2014 ' + pendingCount + ' vote' + (pendingCount!==1?'s':'') + ' outstanding') +
      '</div>' : '';

  const memberRows = CLIME_IC_MEMBERS.map(member => {
    const vote = sv.find(v=>v.memberId===member.id);
    return '<div style="display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border-light);gap:12px">' +
      '<div class="person-initials pi-sc" style="width:32px;height:32px;font-size:11px;flex-shrink:0">' + member.name.split(' ').map(n=>n[0]).join('') + '</div>' +
      '<div style="flex:1"><div style="font-size:13.5px;font-weight:600">' + member.name + '</div><div style="font-size:12px;color:var(--muted)">' + member.role + '</div></div>' +
      (vote && vote.vote
        ? '<div style="text-align:right">' +
            cosBadge(vote.vote==='for'?'\u2713 For':'\u2717 Against', vote.vote==='for'?'var(--emerald-light)':'var(--red-light)', vote.vote==='for'?'var(--emerald-text)':'var(--red)') +
            (vote.notes ? '<div style="font-size:12px;color:var(--muted);margin-top:4px;max-width:220px">' + vote.notes + '</div>' : '') +
            '<div style="font-size:11.5px;color:var(--muted);margin-top:2px">' + (vote.date||'') + '</div>' +
          '</div>'
        : cosBadge('Pending','var(--yellow-light)','var(--yellow)')) +
      '</div>';
  }).join('');

  const prevVotes = (p.votes||[]).filter(v=>v.stage!==(p.stage||1));
  const prevSection = prevVotes.length
    ? '<div class="card section-card" style="margin-top:12px"><div class="section-header"><div class="section-title">Previous Stage Votes</div></div>' +
        prevVotes.map(v=>
          '<div style="display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border-light);gap:10px;font-size:13px">' +
          cosBadge('Stage '+v.stage,'var(--bg-page)','var(--muted)') +
          '<span style="font-weight:500">' + v.name + '</span>' +
          cosBadge(v.vote==='for'?'\u2713 For':'\u2717 Against', v.vote==='for'?'var(--emerald-light)':'var(--red-light)', v.vote==='for'?'var(--emerald-text)':'var(--red)') +
          '<span style="color:var(--muted);flex:1;font-size:12.5px">' + (v.notes||'') + '</span>' +
          '<span style="font-size:11.5px;color:var(--muted)">' + (v.date||'') + '</span>' +
          '</div>'
        ).join('') +
      '</div>' : '';

  return '<div class="card section-card">' +
    '<div class="section-header"><div class="section-title">Stage ' + (p.stage||1) + ' Votes</div>' +
    '<div style="display:flex;gap:8px">' +
    cosBadge(forCount+' For','var(--emerald-light)','var(--emerald-text)') +
    cosBadge(againstCount+' Against', againstCount>0?'var(--red-light)':'var(--bg-page)', againstCount>0?'var(--red)':'var(--muted)') +
    cosBadge(pendingCount+' Pending', pendingCount>0?'var(--yellow-light)':'var(--bg-page)', pendingCount>0?'var(--yellow)':'var(--muted)') +
    '</div></div>' + banner + memberRows +
  '</div>' + prevSection;
}

function cosICTabDocs(p) {
  const docs = p.documents || [];
  const docTypes = ['Approval Report','CCAS SIM','Security Valuation','Legal Review','Compliance Report'];

  const docList = docs.length
    ? docs.map(d =>
        '<div style="display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border-light);gap:12px">' +

async function cosICBizGPTAsk(paperId) {
  const paper = CLIME_IC_PAPERS.find(p=>p.id===paperId);
  const input = document.getElementById('ic-ai-input');
  if (!input || !input.value.trim() || !paper) return;
  const question = input.value.trim();
  input.value = ''; input.style.height = 'auto';
  if (!paper.comments) paper.comments = [];
  const now = new Date().toLocaleString('en-AU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  const chatEl = document.getElementById('ic-ai-chat');
  if (chatEl) chatEl.innerHTML += '<div style="text-align:center;color:var(--muted);padding:8px">\u2726 BizGPT is thinking\u2026</div>';

  try {
    const ctx = 'You are reviewing an investment committee deal for Clime Investment Management. Deal: ' + paper.title +
      ' | Type: ' + paper.type + ' | Amount: $' + paper.amount.toLocaleString() +
      ' | Rate: ' + paper.rate + '% p.a. | LVR: ' + (paper.lvr||'N/A') + '% | Borrower: ' + paper.borrower +
      ' | Summary: ' + (paper.summary||paper.purpose||'') +
      '. Be concise and professional. 2-4 sentences unless a document draft is requested.';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-5', max_tokens:800,
        messages:[{role:'user', content: ctx + '\n\nQuestion: ' + question}]})
    });
    const data = await res.json();
    const reply = data.content?.find(c=>c.type==='text')?.text || 'Unable to generate response.';
    paper.comments.push({author:'BizGPT', content:reply, date:now, isAI:true});
    CosDB.saveICPapers(CLIME_IC_PAPERS);
    paper.auditLog.push({date:now, user:'System', action:'AI query', detail:'Q: '+question.substring(0,80)});
  } catch(err) {
    // Fall back to template response
    const tplReply = cosAITemplateResponse(question);
    paper.comments.push({author:'BizGPT', content:tplReply, date:now, isAI:true, isTemplate:true});
  }
  cosICActiveTab = 'ai';
  cosICRefresh();
}

function cosICTabLog(p) {
  const log = [...(p.auditLog||[])].reverse();
  if (!log.length) return '<div style="text-align:center;padding:24px;color:var(--muted)">No audit entries yet.</div>';
  return '<div class="card section-card">' +
    '<div class="section-header"><div class="section-title">\uD83D\uDCCB Audit Log</div>' +
      '<span style="font-size:12px;color:var(--muted)">' + log.length + ' entries \u00b7 immutable</span>' +
    '</div>' +
    '<div style="font-size:12.5px;color:var(--muted);padding:8px 16px;border-bottom:1px solid var(--border-light)">Full chronological record. Cannot be edited or deleted.</div>' +
    log.map((entry, i) => {
      const isFail    = (entry.action||'').match(/FAIL|CLOS|back/i);
      const isAdvance = (entry.action||'').match(/advanc|approv|complet/i);
      const isSystem  = entry.user === 'System';
      const dot = i===0&&p.dead?'var(--red)':isFail?'var(--red)':isAdvance?'var(--emerald)':isSystem?'var(--blue)':'var(--muted)';
      return '<div style="display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border-light)">' +
        '<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">' +
          '<div style="width:9px;height:9px;border-radius:50%;background:'+dot+';margin-top:5px"></div>' +
          (i<log.length-1?'<div style="width:1px;flex:1;background:var(--border-light);margin:4px 0"></div>':'') +
        '</div>' +
        '<div style="flex:1">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;flex-wrap:wrap">' +
            '<span style="font-size:13px;font-weight:600;color:var(--near-black)">' + entry.action + '</span>' +
            cosBadge(entry.user, isSystem?'var(--blue-light)':'var(--bg-page)', isSystem?'var(--blue)':'var(--muted)') +
          '</div>' +
          '<div style="font-size:12.5px;color:var(--muted);margin-bottom:3px">' + entry.detail + '</div>' +
          '<div style="font-size:11.5px;color:var(--muted)">' + entry.date + '</div>' +
        '</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

function cosICGenerateTemplateMemo(fields) {
  const amount     = Number(fields.amount || 0);
  const amountFmt  = new Intl.NumberFormat('en-AU', {style:'currency', currency:'AUD', minimumFractionDigits:0}).format(amount);
  const rate       = parseFloat(fields.rate) || 0;
  const lvr        = parseFloat(fields.lvr)  || 0;
  const term       = fields.term   || '24 months';
  const security   = fields.security || 'First registered mortgage over the subject property';
  const borrower   = fields.counterparty;
  const purpose    = fields.purpose;
  const dealType   = fields.dealType;
  const title      = fields.title;
  const extra      = fields.extraContext || '';
  const today      = new Date().toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});
  const annualIncome = rate > 0 ? new Intl.NumberFormat('en-AU', {style:'currency', currency:'AUD', minimumFractionDigits:0}).format(amount * rate / 100) : 'To be determined';
  const monthlyIncome = rate > 0 ? new Intl.NumberFormat('en-AU', {style:'currency', currency:'AUD', minimumFractionDigits:0}).format(amount * rate / 100 / 12) : 'To be determined';

  // Risk assessment based on LVR
  const lvrRisk    = lvr === 0 ? 'To be assessed' : lvr <= 55 ? 'Low — conservative LVR provides substantial equity buffer' : lvr <= 65 ? 'Moderate — LVR within acceptable parameters' : lvr <= 72 ? 'Moderate-High — LVR at upper range of policy' : 'High — LVR exceeds standard policy threshold, requires IC approval';
  const lvrRating  = lvr === 0 ? '' : lvr <= 65 ? 'within Clime\'s standard lending parameters' : 'at the upper range of Clime\'s lending parameters, warranting careful consideration';

  // Coverage ratio proxy
  const coverageNote = lvr > 0 ? `The LVR of ${lvr}% implies an equity coverage ratio of approximately ${(100/lvr).toFixed(2)}×, ${lvrRating}.` : 'Coverage ratio to be confirmed upon valuation.';

  // Deal type specific language
  const dealTypeNotes = {
    'First Mortgage Loan': 'As a first mortgage transaction, Clime will hold a first-ranking registered mortgage over the subject property, providing the highest level of security in the capital structure.',
    'Second Mortgage Loan': 'As a second mortgage transaction, Clime will hold a second-ranking registered mortgage. The total debt position (inclusive of senior debt) must be reviewed to confirm aggregate LVR is within policy.',
    'Construction Loan': 'As a construction loan, drawdowns will be subject to independent quantity surveyor approval at each milestone. The facility includes standard construction loan protections including progress claims, site inspection rights, and completion guarantee.',
    'Mezzanine Finance': 'As a mezzanine facility, Clime will hold a subordinated position in the capital structure. The return profile reflects this risk positioning, with enhanced yield compensating for the subordinated security.',
    'Preferred Equity': 'As a preferred equity investment, Clime will hold preferred equity interests with priority distributions ahead of ordinary equity. The transaction is structured to provide downside protection while accessing equity-like returns.',
    'Contributory Mortgage Scheme': 'As a contributory mortgage scheme transaction, this facility will be offered to eligible wholesale investors through Clime\'s CCAS platform, subject to compliance approval and investor disclosure requirements.',
  };
  const dealTypeNote = dealTypeNotes[dealType] || `As a ${dealType} transaction, the facility has been structured to meet Clime's investment criteria and risk parameters.`;

  return `# Investment Committee Memorandum

**${title}**
*Prepared by: Clime Investment Management | Date: ${today}*
*Classification: Confidential — IC Members Only*

---

## 1. Executive Summary

Clime Investment Management is considering a ${dealType.toLowerCase()} to ${borrower} in the amount of ${amountFmt}${rate > 0 ? ` at an interest rate of ${rate}% per annum` : ''}${term ? ` for a term of ${term}` : ''}. ${purpose}

${dealTypeNote}

The Investment Committee is requested to review and vote on this transaction at Stage 1.

---

## 2. Transaction Overview

| Parameter | Detail |
|-----------|--------|
| Facility Type | ${dealType} |
| Borrower / Counterparty | ${borrower} |
| Facility Amount | ${amountFmt} |
| Interest Rate | ${rate > 0 ? rate + '% per annum' : 'To be confirmed'} |
| Term | ${term} |
| LVR | ${lvr > 0 ? lvr + '%' : 'To be confirmed'} |
| Estimated Annual Income | ${annualIncome} |
| Estimated Monthly Income | ${monthlyIncome} |
| Security | ${security} |

---

## 3. Borrower Profile

**Counterparty:** ${borrower}

${extra ? extra + '\n\n' : ''}The borrower has been identified through Clime's deal origination pipeline. Prior to Stage 2 approval, the investment team will conduct full due diligence including:

- Borrower financial statements (minimum 2 years)
- Credit history and existing debt obligations

// Template-based AI responses for when no API credits
function cosAITemplateResponse(question) {
  const q = question.toLowerCase();
  const hasStock = (ticker) => CLIME_STOCKS.find(s => s.ticker === ticker.toUpperCase() || s.company.toLowerCase().includes(ticker.toLowerCase()));

  // IC related
  if (q.includes('ic') || q.includes('greystone') || q.includes('proposal') || q.includes('deal')) {
    const paper = CLIME_IC_PAPERS[0];
    return `**IC Tool Status — ${paper?.title || 'Greystone Logistics Park'}**\n\n` +
      `Current stage: **${paper?.status || 'STAGE1 VOTE'}** | Votes: ${paper ? (paper.votes||[]).filter(v=>v.vote==='for').length : 3}/${CLIME_IC_MEMBERS.length} FOR\n\n` +
      `This is a ${paper?.type || 'First Mortgage'} at ${paper?.rate || '10.75'}% p.a. on a facility of $${paper ? (paper.amount/1000000).toFixed(0) : '22'}M.\n\n` +
      `**To advance:** All IC members need to vote. Once majority is reached, use "Advance Stage →" to move to Stage 2 Approval.\n\n` +
      `*Note: Live BizGPT AI requires API credits at platform.claude.com — currently running on template mode.*`;
  }

  // Stock research
  if (q.includes('oversold') || q.includes('undervalued')) {
    const stocks = CLIME_STOCKS.filter(s => ['OVERSOLD','UNDERVALUED'].includes(s.signal));
    return `**Oversold & Undervalued Stocks — Current Signals**\n\n` +
      stocks.map(s => `**${s.ticker}** (${s.company})\n- Signal: ${s.signal} | MoS: ${s.mos > 0 ? '+' : ''}${s.mos}% | Price: $${s.price} vs IV $${s.iv}\n- EQS: ${s.eqs}/100 | WACC: ${s.wacc}% | NROE: ${s.nroe}%`).join('\n\n') +
      `\n\n*Deep discounts to intrinsic value. OVERSOLD also shows technical weakness on top of IV discount.*`;
  }

  // Macro
  if (q.includes('macro') || q.includes('regime') || q.includes('taa')) {
    return `**Macro Regime — Current Status**\n\n**NEUTRAL (−0.42)**\n\nThe regime score sits at −0.42 on a −1.0 to +1.0 scale, firmly in neutral territory.\n\n**Regime interpretation:**\n- Maintain quality positions\n- Hold elevated cash buffers\n- Trim positions trading above intrinsic value\n- Do not add aggressively to cyclicals\n\n**Key signals driving NEUTRAL:**\n- ASX 200 P/E above 10-year average (bearish)\n- RBA cash rate 3.85% — above CPI 3.2% (mildly bearish)\n- AU unemployment 3.9% (slightly bullish)\n- ASX 200 above 200-day MA (bullish)\n\nFor TAA recommendations, use Macro Workbench → Send TAA Recommendations.`;
  }

  // CCAS
  if (q.includes('ccas') || q.includes('pennington') || q.includes('keystone') || q.includes('credit')) {
    const active = CLIME_CCAS.filter(c => c.status === 'Active');
    return `**CCAS Active Facilities**\n\n` +
      active.map(c => `**${c.name}**\n- Type: ${c.type} | Amount: $${(c.amount/1000000).toFixed(1)}M | Rate: ${c.rate}%\n- Next payment: ${c.nextPayment} | Borrower: ${c.borrower}`).join('\n\n') +
      `\n\n**Total committed:** ~$95M | **Weighted avg yield:** 10.42%\n\n*CCAS positions are illiquid. Redemption requests queue with no guaranteed timing.*`;
  }

  // IQ
  if (q.includes('instruction') || q.includes('queue') || q.includes('iq') || q.includes('iress')) {
    const pending = CLIME_IQ.filter(i => i.status === 'Pending');
    return `**Instruction Queue — ${pending.length} Pending**\n\n` +
      pending.map(i => `- **${i.id}**: ${i.stock} ${i.action} ${i.from}→${i.to} | ${i.sleeves} sleeves | $${(i.value/1000000).toFixed(1)}M`).join('\n') +
      `\n\n**⏱ Iress cutoff: 12:00 AEST today**\n\nUse Instruction Queue → Bulk Approve to generate all dealer instructions in one click, then submit to Iress before cutoff for T+0 settlement.`;
  }

  // Quality screen
  if (q.includes('quality') || q.includes('eqs') || q.includes('screen')) {
    const quality = CLIME_STOCKS.filter(s => s.eqs >= 70 && s.mos > 0).sort((a,b) => b.eqs - a.eqs);
    return `**Quality Screen — EQS ≥ 70 & Trading Below IV**\n\n` +
      quality.slice(0,6).map(s => `**${s.ticker}** — EQS ${s.eqs} | MoS +${s.mos}% | ${s.signal}`).join('\n') +
      `\n\n${quality.length} stocks pass. EQS ≥ 70 is the minimum gate to act on an IV signal. All stocks above also trade below intrinsic value (positive MoS).`;
  }

  // Generic fallback
  const signals = CLIME_STOCKS.filter(s => ['ACTIVE BUY','OVERSOLD','UNDERVALUED'].includes(s.signal));
  return `**BizGPT — Template Mode**\n\nI can see your current portfolio data:\n\n` +
    `- **${signals.length} high-priority signals**: ${signals.map(s=>s.ticker+' ('+s.signal+')').join(', ')}\n` +
    `- **Macro regime**: NEUTRAL −0.42 — hold quality, trim stretched positions\n` +
    `- **IC Tool**: ${CLIME_IC_PAPERS.filter(p=>!p.dead&&!p.closed).length} active deals in pipeline\n` +
    `- **IQ pending**: ${CLIME_IQ.filter(i=>i.status==='Pending').length} instructions before Iress cutoff\n\n` +
    `Try asking about: IC deals, stock signals, macro regime, CCAS facilities, instruction queue, quality screens.\n\n` +
    `*For full AI capabilities, add API credits at platform.claude.com/settings/billing ($5 minimum).*`;
}



async function cosICDraftWithClaude() {
  const fields = cosICCollectFields();
  if (!fields.title||!fields.dealType||!fields.amount||!fields.counterparty||!fields.purpose) {
    cosToast('Fill in Title, Deal Type, Amount, Counterparty and Purpose first', 'error'); return;
  }
  cosICNewFields = fields;
  cosICNewStep = 'draft';
  cosICDrafting = true;
  cosICDraftContent = '';
  cosICRefresh();

  const _bizKey = cosGetApiKey('anthropic');

  // Try live BizGPT API first if key exists
  if (_bizKey) {
    try {
      const prompt = 'You are a structured finance professional at Clime Investment Management. ' +
        'Draft a detailed Investment Committee memorandum for:\n\n' +
        'Title: ' + fields.title + '\nDeal Type: ' + fields.dealType +
        '\nAmount: AUD ' + Number(fields.amount).toLocaleString() +
        '\nCounterparty: ' + fields.counterparty + '\nPurpose: ' + fields.purpose +
        (fields.security?'\nSecurity: '+fields.security:'') +
        (fields.term?'\nTerm: '+fields.term:'') +
        (fields.rate?'\nRate: '+fields.rate+'% p.a.':'') +
        (fields.lvr?'\nLVR: '+fields.lvr+'%':'') +
        (fields.extraContext?'\n\nAdditional Context:\n'+fields.extraContext:'') +
        '\n\nWrite a comprehensive IC memorandum with sections:\n' +
        '## 1. Executive Summary\n## 2. Transaction Overview\n## 3. Borrower Profile\n## 4. Security Package\n## 5. Key Financial Metrics\n## 6. Risk Assessment\n## 7. Recommendation\n\n' +
        'Use professional investment-grade language. Format with ## headings. Third person.';

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':_bizKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:'claude-sonnet-4-5', max_tokens:2000, messages:[{role:'user',content:prompt}]})
      });
      const data = await res.json();
      const textBlock = data.content?.find(c=>c.type==='text');
      if (textBlock) {
        cosICDraftContent = textBlock.text;
        cosICDrafting = false;
        cosICRefresh();
        return; // success — exit early
      }
      // API returned error — fall through to template
      console.warn('BizGPT API error, using template:', data.error?.message);
    } catch(err) {
      console.warn('BizGPT network error, using template:', err.message);
    }
  }

  // Template fallback — works with no key or no credits
  cosICDraftContent = cosICGenerateTemplateMemo(fields);
  cosICDrafting = false;
  cosICRefresh();
}

function cosICSaveWithoutDraft() {
  const fields = cosICCollectFields();

    cosToast('Fill in all required fields first', 'error'); return;

function cosICSave(status) {
  const fields = cosICNewFields;
  const draftEl = document.getElementById('ic-draft-content');
  const content = draftEl ? draftEl.value : cosICDraftContent;
  const now = new Date().toLocaleString('en-AU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const newId = 'IC-2026-' + String(CLIME_IC_PAPERS.length + 5).padStart(3,'0');
  const newPaper = {
    id: newId, title: fields.title, type: fields.dealType,
    amount: parseFloat(fields.amount)||0, rate: parseFloat(fields.rate)||0,
    status: status==='review' ? 'STAGE1 VOTE' : 'DRAFT',
    stage:  status==='review' ? 1 : 0,
    lvr: parseFloat(fields.lvr)||null, coverage: null,
    term: fields.term||'TBD', borrower: fields.counterparty,
    security: fields.security||'To be confirmed',
    summary: fields.purpose, content: content,
    closed: false, dead: false,
    votes: [], comments: [], documents: [],
    auditLog: [{date:now, user:'M. Baragwanath', action:'IC paper created', detail:'New proposal: '+fields.title+'. Status: '+(status==='review'?'STAGE1 VOTE':'DRAFT')+'.'}],
  };
  if (status==='review') newPaper.auditLog.push({date:now, user:'System', action:'Stage advanced to Stage 1', detail:'Moved to STAGE1 VOTE. Notifications sent to IC members.'});
  CLIME_IC_PAPERS.unshift(newPaper);
  cosICSelected = newId;
  cosICNewStep = null;
  cosICActiveTab = 'detail';
  CosDB.saveICPapers(CLIME_IC_PAPERS);
  CosDB.addAuditEntry({user:'M. Baragwanath', action:'IC paper created', detail:newId+' \u2014 '+fields.title+' \u2014 '+(status==='review'?'STAGE1 VOTE':'DRAFT')});
  cosToast('\u2713 IC paper ' + newId + ' created \u2014 ' + (status==='review'?'submitted for IC vote':'saved as draft'));
  cosICRefresh();
}

function cosICExportDocx(paperId) {
  const paper = CLIME_IC_PAPERS.find(p=>p.id===paperId);
  if (!paper) return;
  const content = paper.content||('# '+paper.title+'\n\n**Type:** '+paper.type+'\n**Amount:** $'+paper.amount.toLocaleString()+'\n**Rate:** '+paper.rate+'% p.a.\n**Borrower:** '+paper.borrower+'\n\n## Summary\n\n'+(paper.summary||paper.purpose||''));
  const blob = new Blob([content],{type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = paper.title.replace(/[^a-z0-9]/gi,'_')+'_IC_Paper.txt'; a.click();
  URL.revokeObjectURL(url);
  const now = new Date().toLocaleString('en-AU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  paper.auditLog.push({date:now, user:'M. Baragwanath', action:'Document exported', detail:'IC paper exported to file.'});
  cosToast('\u2193 IC paper exported');
}
