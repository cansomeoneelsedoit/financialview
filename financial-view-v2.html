<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial View</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link rel="stylesheet" href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;
  --black:#111110;
  --near-black:#212120;
  --body-text:#1a1a18;
  --muted:#6b7280;
  --muted-light:#9ca3af;
  --border:#e5e5e3;
  --border-light:#f0f0ee;
  --bg-page:#f8f8f6;
  --bg-card:#ffffff;
  --emerald:#16a34a;
  --emerald-light:#dcfce7;
  --emerald-text:#15803d;
  --red:#dc2626;
  --red-light:#fee2e2;
  --blue:#2563eb;
  --blue-light:#dbeafe;
  --yellow:#d97706;
  --yellow-light:#fef3c7;
  --purple:#7c3aed;
  --purple-light:#ede9fe;
  --sidebar-width:220px;
  --topbar-height:44px;
  --radius-card:12px;
  --radius-sm:6px;
  --radius-md:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.12);
  --font:'Instrument Sans',ui-sans-serif,system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--body-text);background:var(--bg-page);line-height:1.5}

/* ── LAYOUT SHELL ── */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:var(--topbar-height);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:50;position:sticky;top:0}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;color:var(--near-black);text-decoration:none;white-space:nowrap}
.topbar-logo svg{flex-shrink:0}
.topbar-breadcrumb{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;margin-left:4px}
.topbar-breadcrumb span.sep{color:var(--border)}
.topbar-breadcrumb span.active{color:var(--body-text);font-weight:500}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--near-black);color:var(--white);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:none;padding:4px 8px;border-radius:var(--radius-sm);transition:background .15s}
.back-btn:hover{background:var(--bg-page)}

.body-wrap{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-width);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:12px 0}
.sidebar-section{margin-bottom:4px}
.sidebar-section-label{font-size:11px;font-weight:600;color:var(--muted-light);padding:8px 16px 4px;text-transform:uppercase;letter-spacing:.05em}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:7px 16px;color:var(--muted);font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;border-radius:0;position:relative}
.sidebar-item:hover{background:var(--bg-page);color:var(--body-text)}
.sidebar-item.active{color:var(--body-text);background:var(--bg-page)}
.sidebar-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--emerald);border-radius:0 2px 2px 0}
.sidebar-item svg{flex-shrink:0;opacity:.7}
.sidebar-item.active svg{opacity:1}
.sidebar-expand{display:flex;align-items:center;gap:9px;padding:7px 16px;color:var(--muted);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s}
.sidebar-expand:hover{color:var(--body-text)}
.sidebar-expand .chevron{margin-left:auto;transition:transform .2s}
.sidebar-expand.open .chevron{transform:rotate(180deg)}
.sidebar-children{padding-left:12px}
.sidebar-children .sidebar-item{font-size:13px}

/* ── MAIN CONTENT ── */
.main{flex:1;overflow-y:auto;padding:28px 28px 40px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.page-header-left h1{font-size:22px;font-weight:600;color:var(--near-black);line-height:1.2}
.page-header-left p{color:var(--muted);font-size:13.5px;margin-top:3px}
.page-header-actions{display:flex;gap:10px;align-items:center;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-md);font-size:13.5px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .15s;font-family:var(--font)}
.btn-primary{background:var(--emerald);color:var(--white)}
.btn-primary:hover{background:#15803d}
.btn-secondary{background:var(--white);color:var(--body-text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg-page)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-page)}
.btn-dark{background:var(--near-black);color:var(--white)}
.btn-dark:hover{background:#333}

/* ── CARDS ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-sm);transition:box-shadow .2s,border-color .2s}
.card:hover{box-shadow:var(--shadow-md)}

/* ── STAT ROW ── */
.stat-row{display:grid;gap:14px;margin-bottom:20px}
.stat-row-4{grid-template-columns:repeat(4,1fr)}
.stat-row-3{grid-template-columns:repeat(3,1fr)}
.stat-row-2{grid-template-columns:repeat(2,1fr)}
.stat-card{padding:18px 20px}
.stat-label{font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:600;color:var(--near-black);line-height:1}
.stat-sub{font-size:12px;color:var(--muted);margin-top:5px}
.stat-card.green-bg{background:var(--emerald);border-color:var(--emerald)}
.stat-card.green-bg .stat-label,.stat-card.green-bg .stat-value,.stat-card.green-bg .stat-sub{color:rgba(255,255,255,.9)}
.stat-card.green-bg .stat-value{color:#fff}
.stat-positive{color:var(--emerald-text);font-weight:500}
.stat-negative{color:var(--red);font-weight:500}

/* ── SECTION CARD ── */
.section-card{padding:0;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light)}
.section-title{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--near-black)}
.section-title svg{color:var(--muted)}
.view-all{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color .15s}
.view-all:hover{color:var(--body-text)}

/* ── TABLES ── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:12px;font-weight:500;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg-page)}
.data-table td{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:13.5px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg-page)}
.data-table td .text-muted{color:var(--muted);font-size:12px}
.row-chevron{color:var(--muted);cursor:pointer}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11.5px;font-weight:600;line-height:1}
.badge-active{background:var(--near-black);color:var(--white)}
.badge-inactive{background:#e5e5e3;color:var(--muted)}
.badge-review{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.badge-pending{background:var(--yellow-light);color:var(--yellow)}
.badge-upcoming{background:#f3f4f6;color:var(--muted)}
.badge-complete{background:var(--emerald-light);color:var(--emerald-text)}
.badge-overdue{background:var(--red-light);color:var(--red)}
.badge-connected{background:var(--emerald-light);color:var(--emerald-text)}
.badge-notconn{background:#f3f4f6;color:var(--muted)}
.badge-enterprise{background:var(--near-black);color:var(--white)}
.badge-full{background:var(--near-black);color:var(--white)}
.badge-limited{background:#f3f4f6;color:var(--muted)}
.badge-trial{background:#f3f4f6;color:var(--muted)}

/* ── FUND ROWS ── */
.fund-row{padding:14px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;cursor:pointer;transition:background .15s}
.fund-row:last-child{border-bottom:none}
.fund-row:hover{background:var(--bg-page)}
.fund-row-main{flex:1}
.fund-name{font-size:13.5px;font-weight:500;color:var(--near-black)}
.fund-meta{font-size:12px;color:var(--muted);margin-top:2px}
.fund-right{text-align:right}
.fund-balance{font-size:15px;font-weight:600;color:var(--near-black)}
.fund-perf{font-size:12.5px;font-weight:500;margin-top:2px}

/* ── ASSET ALLOCATION BARS ── */
.alloc-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-light)}
.alloc-row:last-child{border-bottom:none}
.alloc-label{width:130px;font-size:13px;color:var(--body-text);flex-shrink:0}
.alloc-bar-wrap{flex:1;height:5px;background:#f0f0ee;border-radius:3px;overflow:hidden}
.alloc-bar{height:100%;border-radius:3px}
.alloc-pct{width:38px;text-align:right;font-size:13px;color:var(--muted);flex-shrink:0}
.alloc-amt{width:80px;text-align:right;font-size:12px;color:var(--muted);flex-shrink:0}

/* ── NOTIFICATION / ACTIVITY ROWS ── */
.notif-row{display:flex;align-items:flex-start;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border-light)}
.notif-row:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.notif-dot.blue{background:#3b82f6}
.notif-dot.yellow{background:#f59e0b}
.notif-dot.green{background:var(--emerald)}
.notif-dot.red{background:var(--red)}
.notif-dot.teal{background:#14b8a6}
.notif-dot.orange{background:#f97316}
.notif-title{font-size:13.5px;font-weight:500;color:var(--near-black)}
.notif-sub{font-size:12px;color:var(--muted);margin-top:2px}
.notif-row.yellow-bg{background:#fffbeb}
.notif-row.green-bg{background:#f0fdf4}

/* ── ACTIVITY FEED ── */
.activity-row{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border-light)}
.activity-row:last-child{border-bottom:none}
.activity-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.activity-icon.green{background:var(--emerald-light);color:var(--emerald-text)}
.activity-icon.blue{background:var(--blue-light);color:var(--blue)}
.activity-icon.purple{background:var(--purple-light);color:var(--purple)}
.activity-icon.yellow{background:var(--yellow-light);color:var(--yellow)}
.activity-icon.gray{background:#f3f4f6;color:var(--muted)}
.activity-main{flex:1}
.activity-title{font-size:13.5px;font-weight:500;color:var(--near-black)}
.activity-sub{font-size:12px;color:var(--muted)}
.activity-time{font-size:12px;color:var(--muted-light);flex-shrink:0}

/* ── COMPLIANCE / PROGRESS BARS ── */
.progress-wrap{height:6px;background:#e5e5e3;border-radius:3px;overflow:hidden;flex:1}
.progress-bar{height:100%;border-radius:3px;background:var(--emerald)}
.compliance-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light)}
.compliance-row:last-child{border-bottom:none}
.compliance-label{width:200px;font-size:13px;color:var(--body-text);flex-shrink:0}
.compliance-pct{width:40px;text-align:right;font-size:13px;font-weight:500;color:var(--near-black);flex-shrink:0}

/* ── PROFILE ── */
.profile-avatar{width:72px;height:72px;border-radius:50%;background:#d1fae5;color:var(--emerald-text);font-size:24px;font-weight:600;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.profile-contact-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light)}
.profile-contact-row:last-child{border-bottom:none}
.profile-contact-label{font-size:11.5px;color:var(--muted);margin-bottom:2px}
.profile-contact-value{font-size:13.5px;color:var(--near-black)}

/* ── SYSTEM OVERVIEW ── */
.sys-row{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border-light)}
.sys-row:last-child{border-bottom:none}
.sys-label{font-size:13.5px;color:var(--body-text)}
.sys-value{font-size:13.5px;font-weight:500}
.sys-value.green{color:var(--emerald-text)}
.sys-value.normal{color:var(--near-black)}

/* ── SETTINGS ── */
.settings-section{margin-bottom:20px}
.settings-section-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border-light)}
.settings-section-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-section-icon.gray{background:#f3f4f6;color:var(--muted)}
.settings-section-icon.red{background:#fee2e2;color:var(--red)}
.settings-section-icon.blue{background:#dbeafe;color:var(--blue)}
.settings-section-icon.green{background:var(--emerald-light);color:var(--emerald-text)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border-light)}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:13.5px;font-weight:500;color:var(--near-black)}
.settings-row-sub{font-size:12px;color:var(--muted);margin-top:2px}
.settings-value{font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:10px}

/* ── TOGGLE ── */
.toggle{width:38px;height:22px;border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--near-black)}
.toggle.off{background:#d1d5db}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:19px}
.toggle.off::after{left:3px}

/* ── SEARCH BAR ── */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:260px;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:13.5px;font-family:var(--font);color:var(--body-text);background:var(--white);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:#a0a0a0}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted-light)}

/* ── REP / PERSON ROWS ── */
.person-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .15s}
.person-row:last-child{border-bottom:none}
.person-row:hover{background:var(--bg-page)}
.person-initials{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.pi-sm{background:#dbeafe;color:#1d4ed8}
.pi-dc{background:#fce7f3;color:#be185d}
.pi-ew{background:#e0e7ff;color:#4338ca}
.pi-mb{background:#fef3c7;color:#b45309}
.pi-lt{background:#d1fae5;color:#065f46}
.pi-js{background:#e0e7ff;color:#4338ca}
.pi-so{background:#fce7f3;color:#be185d}
.pi-ms{background:#dbeafe;color:#1d4ed8}
.pi-em{background:#fef3c7;color:#b45309}
.pi-da{background:#f3f4f6;color:#6b7280}
.pi-lc{background:#fce7f3;color:#be185d}
.pi-mt{background:#dbeafe;color:#1d4ed8}
.pi-sc{background:#fce7f3;color:#be185d}
.pi-jw{background:#e0e7ff;color:#4338ca}
.pi-ed{background:#fef3c7;color:#b45309}
.person-info{flex:1}
.person-name{font-size:13.5px;font-weight:500;color:var(--near-black)}
.person-sub{font-size:12px;color:var(--muted);margin-top:1px}
.person-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.contact-tag{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted)}

/* ── COMPLIANCE SCORE BANNER ── */
.compliance-banner{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:var(--radius-card);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.compliance-banner-left{display:flex;align-items:center;gap:12px}
.compliance-banner-icon{width:36px;height:36px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;color:var(--purple)}
.compliance-banner-label{font-size:14px;font-weight:600;color:var(--near-black)}
.compliance-banner-sub{font-size:12px;color:var(--muted)}
.compliance-banner-score{font-size:32px;font-weight:700;color:var(--purple)}

/* ── GRID LAYOUTS ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.members-card-row{padding:13px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.members-card-row:last-child{border-bottom:none}
.member-amount{font-size:14px;font-weight:600;color:var(--emerald-text)}

/* ── TRANSACTION ROWS ── */
.txn-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border-light)}
.txn-row:last-child{border-bottom:none}
.txn-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.txn-dot.green{background:var(--emerald-light);color:var(--emerald-text)}
.txn-dot.red{background:var(--red-light);color:var(--red)}
.txn-dot.teal{background:#ccfbf1;color:#0f766e}
.txn-dot.orange{background:#ffedd5;color:#c2410c}
.txn-main{flex:1}
.txn-name{font-size:13.5px;font-weight:500;color:var(--near-black)}
.txn-sub{font-size:12px;color:var(--muted)}
.txn-amount{font-size:14px;font-weight:600}
.txn-amount.pos{color:var(--emerald-text)}
.txn-amount.neg{color:var(--red)}

/* ── 404 PAGE ── */
.page-404{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px}
.page-404-icon{width:80px;height:80px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
.page-404 h2{font-size:48px;font-weight:700;color:var(--near-black);line-height:1}
.page-404 h3{font-size:20px;font-weight:600;color:var(--near-black);margin:8px 0 12px}
.page-404 p{font-size:14px;color:var(--muted);max-width:340px;line-height:1.6}
.page-404-actions{display:flex;gap:10px;margin-top:24px}

/* ── WELCOME PAGE ── */
.welcome-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - var(--topbar-height));padding:40px 20px}
.welcome-title{font-size:26px;font-weight:600;color:var(--near-black);margin-bottom:6px}
.welcome-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.portal-grid{display:grid;grid-template-columns:repeat(3,220px);gap:14px;max-width:710px}
.portal-card{padding:20px;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:12px}
.portal-card:hover{box-shadow:var(--shadow-lg)}
.portal-card-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px}
.portal-card-title{font-size:14px;font-weight:600;color:var(--near-black)}
.portal-card-desc{font-size:12.5px;color:var(--muted);line-height:1.5}
.portal-card-link{font-size:13px;font-weight:500;color:var(--blue);display:flex;align-items:center;gap:4px;margin-top:auto}
.portal-card:hover .portal-card-icon{transform:scale(1.05)}
.portal-card-icon{transition:transform .15s}

/* ── POCKET ANALYST CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.chat-msg{max-width:70%}
.chat-msg.user{align-self:flex-end}
.chat-msg.ai{align-self:flex-start}
.chat-bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.5}
.chat-msg.user .chat-bubble{background:var(--near-black);color:#fff;border-radius:12px 12px 2px 12px}
.chat-msg.ai .chat-bubble{background:var(--white);border:1px solid var(--border);color:var(--body-text);border-radius:12px 12px 12px 2px}
.chat-label{font-size:11.5px;color:var(--muted);margin-bottom:4px}
.chat-input-row{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);background:var(--white)}
.chat-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:14px;font-family:var(--font);outline:none}
.chat-input:focus{border-color:#a0a0a0}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-box{background:var(--white);border-radius:var(--radius-card);padding:28px;max-width:420px;width:90%;box-shadow:var(--shadow-lg)}
.modal-title{font-size:16px;font-weight:600;color:var(--near-black);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.modal-body{font-size:13.5px;color:var(--body-text);line-height:1.6;margin-bottom:20px}
.modal-footer{display:flex;align-items:center;gap:12px;justify-content:space-between;margin-top:20px}
.modal-checkbox{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer}
.modal-checkbox input{width:15px;height:15px}

/* ── STATEMENTS ── */
.stmt-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .15s}
.stmt-row:last-child{border-bottom:none}
.stmt-row:hover{background:var(--bg-page)}
.stmt-icon{width:36px;height:36px;border-radius:8px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stmt-main{flex:1}
.stmt-type{font-size:13.5px;font-weight:500;color:var(--near-black)}
.stmt-meta{font-size:12px;color:var(--muted);margin-top:2px}
.stmt-date{font-size:12px;color:var(--muted);flex-shrink:0}
.badge-processing{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}

/* ── TOPBAR PORTAL INDICATOR ── */
.portal-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--bg-page);color:var(--muted);border:1px solid var(--border)}

/* ── FOOTER ── */
.page-footer{text-align:center;font-size:12px;color:var(--muted-light);padding:16px;border-top:1px solid var(--border-light)}


/* ── SLA BARS ── */
.sla-bar-wrap{height:5px;background:#f0f0ee;border-radius:3px;overflow:hidden;width:100%;margin-top:4px}
.sla-bar{height:100%;border-radius:3px}
.sla-bad{background:var(--red)}
.sla-ok{background:var(--yellow)}
.sla-good{background:var(--emerald)}
/* ── TICKET ROW ── */
.ticket-row{display:flex;align-items:flex-start;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .15s}
.ticket-row:last-child{border-bottom:none}
.ticket-row:hover{background:var(--bg-page)}

/* ── CLIMEOS TRADE DESK ── */
.td-shell{display:flex;flex-direction:column;height:100%;background:#0d1117;color:#e6edf3;font-family:var(--font)}
.td-topbar{height:40px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0}
.td-topbar-logo{font-size:13px;font-weight:700;color:#58a6ff;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.td-tab{padding:0 14px;height:40px;display:flex;align-items:center;font-size:12.5px;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.td-tab:hover{color:#e6edf3}
.td-tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.td-body{display:flex;flex:1;overflow:hidden}
.td-sidebar{width:200px;background:#161b22;border-right:1px solid #30363d;padding:12px 0;flex-shrink:0;overflow-y:auto}
.td-sidebar-label{font-size:10px;font-weight:600;color:#8b949e;padding:8px 14px 4px;text-transform:uppercase;letter-spacing:.06em}
.td-sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 14px;color:#8b949e;font-size:12.5px;cursor:pointer;transition:all .15s}
.td-sidebar-item:hover,.td-sidebar-item.active{background:#1c2128;color:#e6edf3}
.td-sidebar-item.active{border-left:2px solid #58a6ff}
.td-main{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.td-card{background:#161b22;border:1px solid #30363d;border-radius:8px}
.td-card-header{padding:10px 14px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between}
.td-card-title{font-size:12px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.td-stat{padding:14px;display:flex;flex-direction:column;gap:4px}
.td-stat-label{font-size:11px;color:#8b949e;font-weight:500}
.td-stat-value{font-size:22px;font-weight:700;color:#e6edf3;line-height:1}
.td-stat-sub{font-size:11.5px}
.td-green{color:#3fb950}
.td-red{color:#f85149}
.td-blue{color:#58a6ff}
.td-yellow{color:#e3b341}
.td-muted{color:#8b949e}
.td-stat-row{display:grid;gap:10px}
.td-stat-row-4{grid-template-columns:repeat(4,1fr)}
.td-stat-row-3{grid-template-columns:repeat(3,1fr)}
.td-two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.td-three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.td-table{width:100%;border-collapse:collapse}
.td-table th{font-size:11px;font-weight:600;color:#8b949e;padding:8px 12px;text-align:left;border-bottom:1px solid #21262d;text-transform:uppercase;letter-spacing:.04em}
.td-table td{padding:9px 12px;border-bottom:1px solid #21262d;font-size:12.5px;color:#e6edf3}
.td-table tr:last-child td{border-bottom:none}
.td-table tr:hover td{background:#1c2128;cursor:pointer}
.td-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.td-badge-buy{background:#0d4a2a;color:#3fb950}
.td-badge-sell{background:#4a0d0d;color:#f85149}
.td-badge-filled{background:#0d3a4a;color:#58a6ff}
.td-badge-pending{background:#3a3a0d;color:#e3b341}
.td-badge-cancelled{background:#2a2a2a;color:#8b949e}
.td-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .15s}
.td-btn-buy{background:#238636;color:#fff}
.td-btn-buy:hover{background:#2ea043}
.td-btn-sell{background:#da3633;color:#fff}
.td-btn-sell:hover{background:#f85149}
.td-btn-ghost{background:transparent;color:#8b949e;border:1px solid #30363d}
.td-btn-ghost:hover{color:#e6edf3;border-color:#8b949e}
.td-input{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:7px 10px;color:#e6edf3;font-family:var(--font);font-size:12.5px;outline:none;width:100%}
.td-input:focus{border-color:#58a6ff}
.td-select{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:7px 10px;color:#e6edf3;font-family:var(--font);font-size:12.5px;outline:none}
.ob-row{display:flex;gap:0;font-size:12px;line-height:1.8;position:relative}
.ob-vol-bar{position:absolute;top:0;bottom:0;opacity:.12;border-radius:2px}
.ob-price{width:80px;font-weight:600;text-align:right;padding-right:12px}
.ob-qty{width:80px;text-align:right;color:#8b949e;padding-right:8px}
.ob-total{width:80px;text-align:right;color:#6e7681}
.chart-placeholder{height:180px;background:#0d1117;border-radius:6px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.chart-line{position:absolute;bottom:0;left:0;right:0;height:100%}

/* ── ORG PORTAL LANDING ── */
.org-portal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:600px;margin:0 auto}

/* ── AAP SMSF EXTRAS ── */
.cp-tab{display:block}
/* ── HIDDEN UTIL ── */
.hidden{display:none!important}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.main>*{animation:fadeIn .2s ease}
</style>
</head>

// ROUTER & STATE

let currentPage = 'welcome';
let sidebarExpanded = {myAccount: true};

function navigate(page, params) {
  currentPage = page;
  render(page, params);
  window.scrollTo(0,0);
}

function render(page, params={}) {
  const main = document.getElementById('main-content');
  const sidebar = document.getElementById('sidebar');
  const breadcrumb = document.getElementById('breadcrumb');
  
  // Reset
  main.innerHTML = '';
  main.style.padding = '';
  main.style.overflow = '';
  main.style.height = '';
  main.style.display = '';
  main.style.flexDirection = '';
  sidebar.innerHTML = '';
  sidebar.className = 'sidebar';
  breadcrumb.innerHTML = '';
  
  switch(page) {
    case 'welcome': renderWelcome(main, sidebar, breadcrumb); break;
    case 'member': renderMemberDash(main, sidebar, breadcrumb); break;
    case 'member-funds': renderMemberFunds(main, sidebar, breadcrumb); break;
    case 'member-statements': renderMemberStatements(main, sidebar, breadcrumb); break;
    case 'member-profile': renderMemberProfile(main, sidebar, breadcrumb); break;
    case 'member-pocket': renderPocketAnalyst(main, sidebar, breadcrumb); break;
    case 'products': renderProducts(main, sidebar, breadcrumb); break;
    case 'products-detail': renderProductDetail(main, sidebar, breadcrumb, params); break;
    case 'org-portal': renderOrgPortal(main, sidebar, breadcrumb, params); break;
    case 'licensees': renderLicensees(main, sidebar, breadcrumb); break;
    case 'licensee-detail': renderLicenseeDetail(main, sidebar, breadcrumb, params); break;
    case 'licensee-reps': renderLicenseeReps(main, sidebar, breadcrumb, params); break;
    case 'licensee-compliance': renderLicenseeCompliance(main, sidebar, breadcrumb, params); break;
    case 'organisations': renderOrganisations(main, sidebar, breadcrumb); break;
    case 'climeos': renderClimeOS(main, sidebar, breadcrumb, params); break;
    case 'smsf-mgmt': renderSMSFMgmt(main, sidebar, breadcrumb, params); break;
    case 'tickets': renderTickets(main, sidebar, breadcrumb, params); break;
    case 'admin': renderAdmin(main, sidebar, breadcrumb); break;
    case 'admin-users': renderAdminUsers(main, sidebar, breadcrumb); break;
    case 'admin-settings': renderAdminSettings(main, sidebar, breadcrumb); break;
    default: render404(main, sidebar, breadcrumb);
  }
}

function setBreadcrumb(el, items) {
  el.innerHTML = items.map((item,i) => {
    if (i === items.length-1) return `<span class="active">${item.label}</span>`;
    return `<a style="color:var(--muted);text-decoration:none;cursor:pointer" onclick="navigate('${item.page}')">${item.label}</a><span class="sep">/</span>`;
  }).join('');
}

function dismissModal() {
  document.getElementById('pa-modal-overlay').style.display = 'none';
  document.getElementById('pa-chat').style.display = 'flex';
  document.getElementById('pa-chat').style.flexDirection = 'column';
  document.getElementById('pa-chat').style.height = '100%';
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msgs = document.getElementById('chat-msgs');
  const val = input.value.trim();
  if (!val) return;
  msgs.innerHTML += `<div class="chat-msg user"><div class="chat-label" style="text-align:right">You</div><div class="chat-bubble">${val}</div></div>`;
  input.value = '';
  msgs.scrollTop = 9999;
  setTimeout(() => {
    msgs.innerHTML += `<div class="chat-msg ai"><div class="chat-label">Pocket Analyst</div><div class="chat-bubble">Thanks for your question. Based on your current portfolio of $496,250 with a YTD return of +10.6%, you're outperforming the benchmark by 0.8%. Your asset allocation looks well-diversified across Australian Shares (35%), International Shares (25%), Property (15%), Fixed Interest (15%), and Cash (10%).</div></div>`;
    msgs.scrollTop = 9999;
  }, 800);
}

function stagePill(s){return`<span style="padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:${SB[s]};color:${SC[s]}">${s}</span>`;}

function toast(msg,type='success'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);background:${{success:'#16a34a',error:'#dc2626',info:'#1e3a5f',warn:'#d97706'}[type]||'#16a34a'};color:#fff;display:flex;align-items:center;gap:8px;transition:opacity .3s`;
  t.textContent=({success:'✓',error:'✕',info:'ℹ',warn:'⚠'}[type]||'✓')+' '+msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2800);
}

function aapModal(html,wide=false){
  const o=document.createElement('div');
  o.className='modal-overlay';
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px';
  o.innerHTML=`<div style="background:#fff;border-radius:12px;max-width:${wide?620:460}px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);max-height:90vh;display:flex;flex-direction:column;overflow:hidden">${html}</div>`;
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  document.body.appendChild(o);
  return o;
}
function mH(t){return`<div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0"><div style="font-size:15px;font-weight:600">${t}</div><button onclick="this.closest('.modal-overlay').remove()" style="border:none;background:transparent;font-size:22px;color:var(--muted);cursor:pointer;line-height:1">×</button></div>`;}
function mF(b){return`<div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0">${b}</div>`;}
function inp(ph='',type='text'){return`<input type="${type}" placeholder="${ph}" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;outline:none;background:#fff">`;}

  if(!funds.length)return'<div style="padding:24px;text-align:center;color:var(--muted)">No funds match your search</div>';
  return`<table class="data-table"><thead><tr><th>Fund</th><th>Members</th><th>Stage</th><th>Owner</th><th>Package</th><th>KYC</th><th>Balance</th><th>YTD</th><th>Group</th><th></th></tr></thead><tbody>
    ${funds.map(f=>{const ow=SMSF_STAFF.find(s=>s.id===f.owner);return`<tr onclick="smsfState.selectedFund=SMSF_FUNDS.find(x=>x.id===${f.id});smsfState.activeTab='overview';smsfNav('fund-detail')" style="cursor:pointer">
      <td><div style="font-weight:500">${f.name}</div><div style="font-size:11px;color:var(--muted)">ABN ${f.abn}</div></td>
      <td style="color:var(--muted);font-size:12.5px">${f.members.slice(0,2).join(', ')}${f.members.length>2?` +${f.members.length-2}`:''}</td>
      <td>${stagePill(f.stage)}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="person-initials ${ow?.cls}" style="width:24px;height:24px;font-size:10px">${ow?.initials}</div><span style="font-size:12px;color:var(--muted)">${ow?.name.split(' ')[0]}</span></div></td>
      <td style="font-size:12px;color:var(--muted)">${f.pkg.split(' — ')[0]}</td>
      <td><span class="badge ${f.kyc==='passed'?'badge-complete':f.kyc==='pending'?'badge-pending':'badge-review'}" style="font-size:10.5px">${f.kyc==='passed'?'✓ Passed':f.kyc==='pending'?'Pending':'Not started'}</span></td>
      <td style="font-weight:600">${f.balance}</td>
      <td class="${f.ytd.startsWith('+')?'stat-positive':'stat-negative'}">${f.ytd}</td>
      <td style="font-size:12px;color:var(--muted)">${f.group||'—'}</td>
      <td class="row-chevron">${icon('chevronRight',13)}</td>
    </tr>`;}).join('')}
  </tbody></table>`;
}

function aapFilterFunds(q){
  const w=document.getElementById('funds-table-wrap');if(!w)return;
  const l=q.toLowerCase();
  w.innerHTML=aapFundsTable(SMSF_FUNDS.filter(f=>
    f.name.toLowerCase().includes(l)||f.stage.toLowerCase().includes(l)||
    f.members.some(m=>m.toLowerCase().includes(l))||
    (SMSF_STAFF.find(s=>s.id===f.owner)?.name||'').toLowerCase().includes(l)||
    f.group.toLowerCase().includes(l)));
}

function aapAcceptHandoff(id){
  const h=SMSF_HANDOFFS.find(x=>x.id===id);
  if(h){h.status='accepted';toast('Handoff accepted — '+h.fund+' is now in your custody');}
  const m=document.getElementById('main-content');
  if(m)({dashboard:renderAAP_Dashboard,master:renderAAP_Master,funds:renderAAP_Funds,'fund-detail':renderAAP_FundDetail})[smsfState.view]?.(m);
}

function renderFundTab(f,tab){
  switch(tab){
    case'overview':  return tabOverview(f);
    case'tasks':     return tabTasks(f);
    case'documents': return tabDocuments(f);
    case'filenotes': return tabFileNotes(f);
    case'kyc':       return tabKYC(f);
    case'messages':  return tabMessages(f);
    case'timeline':  return tabTimeline(f);
    case'lodgement': return tabLodgement(f);
    default:         return`<div style="padding:20px;color:var(--muted)">Coming soon</div>`;
  }
}

// ── Tab: Tasks ────────────────────────────────────────────────────
function tabTasks(f){
  const base=SMSF_TASKS[f.stage]||[];
  const tasks=base.map(t=>({...t,done:smsfState.tasksDirty[f.id+'_'+t.id]!==undefined?smsfState.tasksDirty[f.id+'_'+t.id]:t.done}));
  const doneCount=tasks.filter(t=>t.done).length;
  const pct=tasks.length?doneCount/tasks.length*100:0;
  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:13px;color:var(--muted)">${doneCount} of ${tasks.length} tasks complete · <strong>${f.stage}</strong> stage</div>
      <button class="btn btn-ghost" style="padding:5px 12px;font-size:12.5px" onclick="aapAddTask()">+ Add task</button>
    </div>
    <div style="height:6px;background:#e5e5e3;border-radius:3px;margin-bottom:14px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:var(--emerald);border-radius:3px;transition:width .3s"></div>
    </div>
    <div class="card section-card" id="tasks-list">
      ${tasks.map(t=>`
        <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border-light)">
          <div onclick="aapToggleTask(${f.id},${t.id})" style="width:20px;height:20px;border-radius:50%;border:2px solid ${t.done?'#16a34a':'#d1d5db'};background:${t.done?'#16a34a':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#fff;flex-shrink:0;margin-top:1px;transition:all .2s">${t.done?'✓':''}</div>
          <div style="flex:1">
            <div style="font-size:13.5px;${t.done?'text-decoration:line-through;color:var(--muted)':'color:var(--body-text)'}">${t.name}</div>
            <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${t.meta}${t.overdue&&!t.done?` <span style="color:#dc2626;font-weight:600">· Overdue</span>`:''}</div>
          </div>
          ${!t.done?`<button class="btn btn-ghost" style="padding:3px 8px;font-size:11.5px" onclick="aapToggleTask(${f.id},${t.id})">Mark done</button>`:''}
        </div>`).join('')}
    </div>
    <div id="new-task-area"></div>`;
}

function aapToggleTask(fundId,taskId){
  const key=fundId+'_'+taskId;
  const stage=smsfState.selectedFund?.stage;
  const base=(SMSF_TASKS[stage]||[]).find(t=>t.id===taskId);
  const cur=smsfState.tasksDirty[key]!==undefined?smsfState.tasksDirty[key]:(base?.done||false);
  smsfState.tasksDirty[key]=!cur;
  renderAAP_FundDetail(document.getElementById('main-content'));
  toast(cur?'Task marked incomplete':'Task completed ✓');
}

function aapAddTask(){
  const area=document.getElementById('new-task-area');if(!area)return;
  area.innerHTML=`<div style="display:flex;gap:8px;padding:12px 20px;background:#f9f9f7;border-radius:8px;margin-top:8px">
    <input id="new-task-input" placeholder="Task description..." style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13.5px">
    <select style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px">
      ${SMSF_STAFF.map(s=>`<option>${s.name}</option>`).join('')}
    </select>
    <input type="date" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px">
    <button class="btn btn-primary" style="padding:8px 14px" onclick="const v=document.getElementById('new-task-input').value;if(v){toast('Task added: '+v);document.getElementById('new-task-area').innerHTML=''}">Add</button>
    <button class="btn btn-ghost" style="padding:8px 12px" onclick="document.getElementById('new-task-area').innerHTML=''">Cancel</button>
  </div>`;
  document.getElementById('new-task-input').focus();
}


// ── Tab: Documents (year tabs + type groups) ──────────────────────
function tabDocuments(f){
  const years=['FY2026','FY2025','FY2024','All'];
  const curY=smsfState.docsYear||'FY2026';
  const allDocs=SMSF_DOCS[f.id]||{};
  let docs=curY==='All'?Object.values(allDocs).flat():allDocs[curY]||[];
  const byType={};
  docs.forEach(d=>{if(!byType[d.type])byType[d.type]=[];byType[d.type].push(d);});
  const sb={verified:'badge-complete',signed:'badge-complete',lodged:'badge-connected',sent:'badge-complete',filed:'badge-upcoming',uploaded:'badge-upcoming'};

  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;gap:4px">
        ${years.map(y=>`<button onclick="smsfState.docsYear='${y}';renderAAP_FundDetail(document.getElementById('main-content'))"
          style="padding:6px 14px;border-radius:6px;border:1px solid ${curY===y?SC[f.stage]:'var(--border)'};background:${curY===y?SB[f.stage]:'#fff'};color:${curY===y?SC[f.stage]:'var(--muted)'};font-family:var(--font);font-size:13px;font-weight:${curY===y?600:400};cursor:pointer;transition:all .15s">${y==='All'?'All years':y}</button>`).join('')}
      </div>
      <button class="btn btn-primary" style="font-size:12.5px" onclick="aapModalUpload()">↑ Upload</button>
    </div>
    ${docs.length===0?`<div class="card" style="padding:28px;text-align:center;color:var(--muted)">No documents for ${curY}<br><button class="btn btn-ghost" style="margin-top:12px" onclick="aapModalUpload()">Upload first document</button></div>`:''}
    ${Object.entries(byType).map(([type,tdocs])=>`
      <div class="card section-card" style="margin-bottom:12px">
        <div class="section-header"><div class="section-title">${icon('file')} ${type} <span style="font-size:11px;color:var(--muted);font-weight:400">${tdocs.length} file${tdocs.length!==1?'s':''}</span></div></div>
        ${tdocs.map(d=>`
          <div style="display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border-light)">
            <div style="font-size:20px;flex-shrink:0">${d.icon}</div>
            <div style="flex:1">
              <div style="font-size:13.5px;font-weight:500">${d.name}</div>
              <div style="font-size:11.5px;color:var(--muted)">${d.type} · ${d.size} · ${d.date}</div>
            </div>
            <span class="badge ${sb[d.status]||'badge-upcoming'}" style="font-size:10.5px">${d.status}</span>
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick="toast('Downloading: '+${JSON.stringify(d.name)})">↓ Download</button>
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px;color:var(--red)" onclick="if(confirm('Delete '+${JSON.stringify(d.name)}+'?')){toast('Document deleted','error')}">✕</button>
          </div>`).join('')}
      </div>`).join('')}`;
}

// ── Tab: File Notes (filters + pagination + 3CX draft approve) ────
function tabFileNotes(f){
  let notes=(SMSF_NOTES[f.id]||[]);
  const ft=smsfState.noteFilter||'all';
  const fs=smsfState.noteStaff||'all';
  if(ft!=='all')notes=notes.filter(n=>n.type===ft);
  if(fs!=='all')notes=notes.filter(n=>n.staff===fs);
  const perPage=3;
  const totalPages=Math.max(1,Math.ceil(notes.length/perPage));
  const page=Math.min(smsfState.notePage||1,totalPages);
  const paged=notes.slice((page-1)*perPage,page*perPage);

  return`
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <select onchange="smsfState.noteFilter=this.value;smsfState.notePage=1;renderAAP_FundDetail(document.getElementById('main-content'))"
        style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;background:#fff">
        ${['all','call','email','manual','system'].map(t=>`<option value="${t}" ${ft===t?'selected':''}>${t==='all'?'All types':t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}
      </select>
      <select onchange="smsfState.noteStaff=this.value;smsfState.notePage=1;renderAAP_FundDetail(document.getElementById('main-content'))"
        style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;background:#fff">
        <option value="all">All staff</option>
        ${SMSF_STAFF.map(s=>`<option value="${s.name}" ${fs===s.name?'selected':''}>${s.name}</option>`).join('')}
      </select>
      <input type="date" style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px">
      <span style="font-size:12px;color:var(--muted);margin-left:auto">${notes.length} note${notes.length!==1?'s':''}</span>
      <button class="btn btn-primary" style="padding:7px 14px;font-size:12.5px" onclick="aapModalNote()">+ Add note</button>
    </div>
    ${paged.length===0?`<div class="card" style="padding:24px;text-align:center;color:var(--muted)">No notes match your filter<br><button class="btn btn-ghost" style="margin-top:10px" onclick="smsfState.noteFilter='all';smsfState.noteStaff='all';renderAAP_FundDetail(document.getElementById('main-content'))">Clear filters</button></div>`:''}
    ${paged.map(n=>`
      <div style="background:#fff;border:1px solid ${n.pinned?'#d97706':n.draft?'#fde68a':'var(--border)'};border-radius:10px;padding:14px 16px;margin-bottom:10px;${n.pinned?'background:#fffbeb':''}">
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">
          <div style="width:32px;height:32px;border-radius:50%;background:${n.bg};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${n.icon}</div>
          <div style="flex:1">

function aapApproveDraft(btn){
  const card=btn.closest('[style*=border]');
  if(card){card.style.borderColor='var(--border)';card.style.background='';

    actionRow.innerHTML=`<span style="font-size:12px;color:var(--emerald-text)">✓ Published ${new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}</span>`;
  }

}

function aapModalSign(){
  aapModal(mH('✍ Digital Signature')+`
    <div style="padding:16px 20px">
      ${fg('Document to sign',sel(['Annual Return Declaration FY2024-25','Investment Strategy Review','Fund Minutes — March 2026','Engagement Letter']))}
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Signature</label>
        <div style="border:2px dashed var(--border);border-radius:8px;height:140px;background:var(--bg-page);position:relative;overflow:hidden;cursor:crosshair">
          <canvas id="aap-sig" width="420" height="136" style="width:100%;height:100%"></canvas>
          <div id="aap-sig-ph" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;pointer-events:none">Draw signature here</div>
        </div>
        <button class="btn btn-ghost" style="margin-top:6px;font-size:12px" onclick="const c=document.getElementById('aap-sig');c.getContext('2d').clearRect(0,0,c.width,c.height);document.getElementById('aap-sig-ph').style.display='flex'">Clear</button>
      </div>
    </div>`+mF(`<button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove();toast('Document signed and saved')">✍ Apply Signature</button>`));
  setTimeout(()=>{
    const c=document.getElementById('aap-sig');if(!c)return;
    const ctx=c.getContext('2d');ctx.strokeStyle='#1a1a18';ctx.lineWidth=2;ctx.lineCap='round';
    let drawing=false;
    c.onmousedown=e=>{drawing=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);document.getElementById('aap-sig-ph').style.display='none'};
    c.onmousemove=e=>{if(!drawing)return;ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke()};
    c.onmouseup=c.onmouseleave=()=>drawing=false;
  },100);
}

function ticketPill(status){return `<span style="padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600;background:${TSB[status]||'#f3f4f6'};color:${TS[status]||'#6b7280'}">${status.charAt(0).toUpperCase()+status.slice(1)}</span>`;}
function priorityPill(p){return `<span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:${TPB[p]||'#f3f4f6'};color:${TP[p]||'#6b7280'}">${p.charAt(0).toUpperCase()+p.slice(1)}</span>`;}
function timeAgo(dateStr){
  const d=new Date(dateStr),now=new Date();
  const diff=Math.floor((now-d)/60000);
  if(diff<60)return diff+'m ago';
  if(diff<1440)return Math.floor(diff/60)+'h ago';
  return Math.floor(diff/1440)+'d ago';
}
function sentimentIcon(s){return s>0?'😊':s<0?'😟':'😐';}

// ── ROUTER ─────────────────────────────────────────────────────────
function renderTickets(main, sidebar, bc, params = {}) {
  const filter = params.filter || ticketState.view;
  ticketState.view = filter;
  if (params.id) { ticketState.selectedTicket = TICKETS_ALL.find(t=>t.id===parseInt(params.id)); }

  buildTicketsSidebar(sidebar, filter === 'all' || filter === 'open' || filter === 'pending' || filter === 'resolved' ? filter : 'all');
  setBreadcrumb(bc, [{label:'Echo Tickets',page:'tickets'}, ...(ticketState.selectedTicket?[{label:'#'+ticketState.selectedTicket.id+' '+ticketState.selectedTicket.subject.substring(0,30)+'...'}]:[])]);

  if (params.id && ticketState.selectedTicket) {
    renderTicketDetail(main);
  } else if (filter === 'dashboard') {
    renderTicketDashboard(main);
  } else {
    renderTicketList(main, filter);
  }
}

  main.innerHTML=`
    <div class="page-header">

function ticketRow(t) {
  const agent = TICKET_AGENTS.find(a=>a.id===t.agent);
  return `<div onclick="navigate('tickets',{filter:'all',id:${t.id}})" style="display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--bg-page)'" onmouseout="this.style.background='transparent'">
    <div style="width:60px;font-size:12.5px;font-weight:600;color:var(--muted)">#${t.id}</div>
    <div style="flex:1;min-width:0;padding-right:12px">
      <div style="font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.subject}</div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:2px">${t.type} ${t.tags.map(tag=>`<span style="background:#f3f4f6;padding:1px 6px;border-radius:8px;font-size:10.5px;color:var(--muted)">${tag}</span>`).join(' ')}</div>
    </div>

    <div style="width:100px">
      ${agent?`<div style="display:flex;align-items:center;gap:6px"><div class="person-initials ${agent.cls}" style="width:22px;height:22px;font-size:9px">${agent.initials}</div><span style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${agent.name.split(' ')[0]}</span></div>`:'<span style="font-size:12px;color:var(--muted)">—</span>'}
    </div>
    <div style="width:90px">${ticketPill(t.status)}</div>
    <div style="width:80px">${priorityPill(t.priority)}</div>
    <div style="width:80px;font-size:16px;text-align:center">${sentimentIcon(t.score)}</div>
    <div style="width:70px;font-size:12px;color:var(--muted)">${timeAgo(t.updated)}</div>
  </div>`;
}

function ticketSearch(q) {
  const wrap = document.getElementById('ticket-list-wrap');
  if (!wrap) return;
  const l = q.toLowerCase();
  const filtered = TICKETS_ALL.filter(t=>
    t.subject.toLowerCase().includes(l) || t.company.toLowerCase().includes(l) ||
    t.requester.toLowerCase().includes(l) || t.type.toLowerCase().includes(l) ||
    String(t.id).includes(l) || t.tags.some(tag=>tag.includes(l))
  );
  wrap.innerHTML = filtered.length ?
    filtered.map(t=>ticketRow(t)).join('') :
    '<div style="padding:28px;text-align:center;color:var(--muted)">No tickets match your search</div>';
}

function ticketFilterStatus(v) {
  const wrap = document.getElementById('ticket-list-wrap');if(!wrap)return;
  const filtered = v==='all' ? TICKETS_ALL : TICKETS_ALL.filter(t=>t.status===v);
  wrap.innerHTML = filtered.map(t=>ticketRow(t)).join('');
}

function ticketFilterPriority(v) {
  const wrap = document.getElementById('ticket-list-wrap');if(!wrap)return;
  const filtered = v==='all' ? TICKETS_ALL : TICKETS_ALL.filter(t=>t.priority===v);
  wrap.innerHTML = filtered.map(t=>ticketRow(t)).join('');
}

function ticketFilterAgent(v) {
  const wrap = document.getElementById('ticket-list-wrap');if(!wrap)return;
  const filtered = v==='all' ? TICKETS_ALL : TICKETS_ALL.filter(t=>t.agent===v);
  wrap.innerHTML = filtered.map(t=>ticketRow(t)).join('');
}

        </div>

        <div class="card" style="padding:10px 14px">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Actions</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${[['Resolve Ticket','toast(\'Ticket resolved\')'],['Close Ticket','toast(\'Ticket closed\')'],
               ['Merge Tickets','toast(\'Select ticket to merge\',\'info\')'],['Delete Ticket','if(confirm(\'Delete this ticket?\'))toast(\'Ticket deleted\',\'error\')']
              ].map(([l,a])=>`<button class="btn btn-ghost" style="justify-content:flex-start;font-size:12px;padding:6px 10px" onclick="${a}">${l}</button>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

function switchReplyMode(mode) {
  const replyBtn = document.getElementById('reply-btn');
  const noteBtn = document.getElementById('note-btn');
  const body = document.getElementById('reply-body');
  if (!replyBtn) return;
  if (mode === 'reply') {
    replyBtn.className = 'btn btn-secondary';
    noteBtn.className = 'btn btn-ghost';
    body.style.background = '#fff';
    body.placeholder = 'Write your reply...';
  } else {
    noteBtn.className = 'btn btn-secondary';
    replyBtn.className = 'btn btn-ghost';
    body.style.background = '#fffbeb';
    body.placeholder = 'Add a private note (only visible to agents)...';
  }
}

function showNewTicketModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px';
  overlay.innerHTML = `<div style="background:#fff;border-radius:12px;max-width:580px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);max-height:90vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div style="font-size:15px;font-weight:600">Create New Ticket</div>
      <button onclick="this.closest('.modal-overlay').remove()" style="border:none;background:transparent;font-size:22px;color:var(--muted);cursor:pointer">×</button>
    </div>
    <div style="padding:16px 20px;overflow-y:auto">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Requester *</label><input placeholder="Name or email..." style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px"></div>
        <div><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Company</label>
        <select style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;background:#fff"><option>Select company...</option>${TICKET_COMPANIES.map(c=>`<option>${c.name}</option>`).join('')}</select></div>
      </div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Subject *</label><input placeholder="Brief subject..." style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
        <div><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Type</label>
        <select style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;background:#fff"><option>SMSF Administration</option><option>Tax Query</option><option>Compliance</option><option>KYC</option><option>Billing</option><option>Access Issue</option><option>Data Change</option><option>Onboarding</option><option>Other</option></select></div>
        <div><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Priority</label>
        <select style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;background:#fff"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select></div>
        <div><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Agent</label>
        <select style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;background:#fff"><option>Unassigned</option>${TICKET_AGENTS.map(a=>`<option>${a.name}</option>`).join('')}</select></div>
      </div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Description</label><textarea placeholder="Describe the issue..." rows="5" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;resize:vertical"></textarea></div>
    </div>
    <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove();toast('Ticket created successfully')">${icon('check',13)} Create Ticket</button>
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay)overlay.remove(); });
  document.body.appendChild(overlay);
}

  const card = btn.closest('[style*="border"]');
  const isPinned = card && card.style.background.includes('fffbeb');
  toast(isPinned ? 'Note unpinned' : 'Note pinned');
}
